name: Ultra Fast Authorized Media Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Media URL to download'
        required: true
        type: string
      mode:
        description: 'Download mode and format'
        required: true
        type: choice
        options:
          - best-mp4
          - 1080p-mp4
          - 720p-mp4
          - audio-mp3
          - audio-m4a
      playlist:
        description: 'Download a playlist if the URL contains one'
        required: true
        type: boolean
        default: false
      subtitles:
        description: 'Download subtitles when available'
        required: true
        type: boolean
        default: false
      extra_ytdlp_args:
        description: 'Optional extra yt-dlp arguments'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg aria2 zip python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade yt-dlp

      - name: Write optional cookies
        if: ${{ secrets.YTDLP_COOKIES_TXT != '' }}
        run: |
          printf '%s' "${{ secrets.YTDLP_COOKIES_TXT }}" > cookies.txt
          chmod 600 cookies.txt

      - name: Download media
        run: |
          python3 scripts/download.py \
            --url "${{ github.event.inputs.url }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --playlist "${{ github.event.inputs.playlist }}" \
            --subtitles "${{ github.event.inputs.subtitles }}" \
            --extra-args "${{ github.event.inputs.extra_ytdlp_args }}"

      - name: Package downloaded media
        run: |
          mkdir -p artifact
          zip -r artifact/media-output.zip downloads

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: media-output
          path: artifact/media-output.zip
          retention-days: 3
